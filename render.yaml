services:
  # ── Node.js Backend ──────────────────────────────────────────────────────────
  - type: web
    name: krishi-kavach-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 30d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: GOV_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false          # set to your Netlify URL after deploy
      - key: ML_SERVICE_URL
        sync: false          # set to ML service Render URL after deploy
      - key: CROP_IDENTIFIER_URL
        sync: false
      - key: ADVISORY_URL
        sync: false
      - key: RENDER
        value: true
