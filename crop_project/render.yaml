services:
  # ── Python ML / FastAPI Service ──────────────────────────────────────────────
  - type: web
    name: krishi-kavach-ml
    runtime: python
    rootDir: crop_project
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    # Render free plan: 512 MB RAM — PyTorch + HF models will be heavy.
    # Hugging Face models are cached in /root/.cache/huggingface after first boot.
    envVars:
      - key: PORT
        value: 10000
